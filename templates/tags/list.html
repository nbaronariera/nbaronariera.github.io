{% extends "layout.html" %}

{% block content %}
<div class="flex items-center flex-col mt-10 px-4">
  <h1 class="text-3xl font-bold text-slate-800 dark:text-white mb-8">
    Tags
  </h1>

  <div class="flex flex-wrap justify-center gap-3 w-full max-w-4xl">
    {% for term in terms %}
    <a href="{{ term.permalink }}" class="px-4 py-2 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-full shadow-sm hover:shadow-md hover:border-emerald-300 dark:hover:border-emerald-700 transition-all duration-200">
      <span class="text-slate-700 dark:text-slate-300 font-medium">#{{ term.name }}</span>
      <span class="text-slate-500 dark:text-slate-400 text-sm ml-1">({{ term.pages | length }})</span>
    </a>
    {% endfor %}
  </div>
</div>
{% endblock content %}
